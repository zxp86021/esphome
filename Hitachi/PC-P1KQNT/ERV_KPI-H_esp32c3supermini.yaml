substitutions:
  upper_devicename: "Hitachi ERV KPI-153H"

esphome:
  name: "hitachi-heat-exchanger"
  friendly_name: "hitachi-heat-exchanger"
  comment: $upper_devicename
  project:
    name: Hitachi.KPI-153H
    version: "1.0"

esp32:
  variant: esp32c3
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:
  level: ERROR #NONE, ERROR, WARN, INFO, DEBUG
  baud_rate: 0

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Hitachi-Heat-Exchanger"
    password: !secret wifi_ap_password

captive_portal:

uart:
  id: uart_modbus
  tx_pin: GPIO20
  rx_pin: GPIO21
  baud_rate: 9600
  stop_bits: 1
  parity: NONE
  #debug:
  #  direction: BOTH
  #  dummy_receiver: false

modbus:
  #flow_control_pin: GPIOXX
  uart_id: uart_modbus
  id: modbus1
  send_wait_time: 250ms

modbus_controller:
- id: modbus_device
  address: 0x1   ## address of the Modbus slave device on the bus
  modbus_id: modbus1
  command_throttle: 100ms
  setup_priority: -10
  update_interval: 5s

# optional binary sensor to monitor serial connection:
binary_sensor:
  - platform: status
    name: "Status"

status_led:
  pin:
    number: GPIO8 # Blue LED
    inverted: true

button:
  - platform: safe_mode
    name: Safe Mode Boot
    entity_category: diagnostic
  - platform: restart
    name: "Restart"

select:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    id: "select_ventilate_mode"
    name: "Ventilate Mode"
    address: 0x21
    optionsmap:
      "Auto": 1
      "Heat Exchange": 8
      "Normal": 16
    optimistic: true
    icon: "mdi:cog"

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    id: "select_fan_speed"
    name: "Fan Speed"
    address: 0x22
    optionsmap:
      "Hi": 2
      "Low": 4
    optimistic: true
    icon: "mdi:fan"
    on_value:
      then:
        - lambda: |-
            if (id(fan_speed_power).state) {
              if (x.c_str() == "Hi" && id(fan_speed_power).speed != 2) {
                id(fan_speed_power).make_call().set_speed(2).perform();
              }
              if (x.c_str() == "Low" && id(fan_speed_power).speed != 1) {
                id(fan_speed_power).make_call().set_speed(1).perform();
              }
            }

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    filters:
      - lambda: return x / 3600;
    unit_of_measurement: "h"
    accuracy_decimals: 1

  - platform: internal_temperature
    name: "ESP Temperature"

  # Disabled because some error message
  #- platform: modbus_controller
  #  modbus_controller_id: modbus_device
  #  name: "Indoor Temperature"
  #  register_type: read
  #  address: 0x00
  #  value_type: U_WORD
  #  unit_of_measurement: "℃"
  #  accuracy_decimals: 0
  #  icon: "mdi:thermometer"

text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"

switch:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    id: "switch_power"
    name: "Power"
    register_type: holding
    address: 0x20
    use_write_multiple: false
    bitmask: 1
    icon: "mdi:power"
    on_turn_on:
      if:
        condition:
          fan.is_off: fan_speed_power
        then:
          - fan.turn_on:
              id: fan_speed_power
              speed: !lambda |-
                if (id(select_fan_speed).current_option() == "Hi") {
                  return 2;
                } else {
                  return 1;
                }
    on_turn_off:
      if:
        condition:
          fan.is_on: fan_speed_power
        then:
          - fan.turn_off: fan_speed_power

time:
  - platform: homeassistant
    id: homeassistant_time

fan:
  - platform: template
    id: "fan_speed_power"
    name: "Fan Speed Power"
    has_direction: false
    has_oscillating: false
    speed_count: 2
    on_turn_on:
      if:
        condition:
          switch.is_off: switch_power
        then:
          - switch.turn_on: switch_power
    on_turn_off:
      if:
        condition:
          switch.is_on: switch_power
        then:
          - switch.turn_off: switch_power
    on_speed_set:
      - lambda: |-
          if (x == 2 && id(select_fan_speed).current_option() != "Hi") {
            id(select_fan_speed).make_call().set_option("Hi").perform();
          }
          if (x == 1 && id(select_fan_speed).current_option() != "Low") {
            id(select_fan_speed).make_call().set_option("Low").perform();
          }
